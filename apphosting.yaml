# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 1
  memoryMiB: 1024

env:
  # Enable this after you provision a runtime bucket for persisted batch storage.
  # - variable: APP_STORAGE_BUCKET
