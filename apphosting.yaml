  #   availability:
  #     - BUILD
  #     - RUNTIME

  - variable: NEXT_PUBLIC_GOOGLE_CLIENT_ID
    value: 427672120146-pad59667c3odvrnqk9l5516ah20s8u3h.apps.googleusercontent.com
    availability:
      - BUILD
      - RUNTIME
